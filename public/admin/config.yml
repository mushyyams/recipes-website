# Update `repo` and `branch` to match your GitHub repository before deploying.
# For local editing with live GitHub saves, run `npm run cms` in another terminal.

backend:
  name: github
  repo: mushyyams/recipes-website
  branch: main
  base_url: https://recipes-website-psi.vercel.app
  auth_endpoint: api/decap-auth

media_folder: public/images/recipes
public_folder: /images/recipes

locale: en
publish_mode: editorial_workflow

preview_path: recipes/{{slug}}

collections:
  - name: recipes
    label: Recipes
    label_singular: Recipe
    folder: content/recipes
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    identifier_field: title
    summary: "{{title}} — {{category}}"
    fields:
      - label: Recipe title
        name: title
        widget: string
        hint: The name of your recipe as it appears on the site

      - label: URL slug
        name: slug
        widget: string
        hint: Lowercase letters, numbers, and hyphens only — e.g. honey-garlic-salmon
        pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', 'Use lowercase letters, numbers, and hyphens only']

      - label: Short description
        name: excerpt
        widget: text
        hint: One compelling sentence for cards and search results

      - label: Category
        name: category
        widget: select
        options:
          - Dinner
          - Lunch
          - Breakfast
          - Snacks
          - Pasta
          - Dessert
          - Drinks

      - label: Difficulty
        name: difficulty
        widget: select
        options:
          - Easy
          - Medium
          - Advanced

      - label: Tags
        name: tags
        widget: list
        default: []
        field:
          label: Tag
          name: tag
          widget: string

      - label: Prep time
        name: prepTime
        widget: recipeTime
        default: "10 min"

      - label: Cook time
        name: cookTime
        widget: recipeTime
        default: "20 min"

      - label: Servings
        name: servings
        widget: number
        value_type: int
        min: 1
        default: 4

      - label: Featured on homepage
        name: featured
        widget: boolean
        default: false

      - label: Published date
        name: publishedAt
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        default: ""

      - label: Hero image
        name: image
        widget: image
        allow_multiple: false

      - label: Image description
        name: imageAlt
        widget: string
        hint: Describe the photo for accessibility

      - label: TikTok or video link
        name: video
        widget: string
        required: false
        hint: Full TikTok link for this recipe

      - label: Ingredients
        name: ingredients
        widget: recipeIngredientsList

      - label: The Recipe
        name: steps
        widget: recipeStepsList

      - label: Notes & story
        name: body
        widget: recipeNotes
